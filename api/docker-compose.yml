version: '3.5'

services:
  postgresdb17:
    image: postgres:17
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - ./postgresql:/var/lib/postgresql/data
    command: ['postgres', '-c', 'log_statement=all']

  redis:
    image: redis:7-alpine
    environment:
      NO_COLOR: 'true'
    ports:
      - 6379:6379
    volumes:
      - ./redis:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 10s
      timeout: 20s
      retries: 3

  adminer:
    env_file: .env
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      - postgresdb17
